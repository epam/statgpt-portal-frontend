name: PR Workflow

on:
  pull_request:
    branches: [development, release-*]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  run_tests:
    uses: epam/ai-dial-ci/.github/workflows/node_pr.yml@4.7.0
    with:
      node-version: "24"
    secrets: inherit
