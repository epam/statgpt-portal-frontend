name: Release Workflow

on:
  push:
    branches: [development, release-*]

permissions:
  contents: write
  packages: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: "epam/statgpt-portal-frontend"

jobs:
  test:
    uses: epam/ai-dial-ci/.github/workflows/node_test.yml@3.1.3
    with:
      bypass-checks: false
      format-checks-enabled: true
      format-checks-bypassed: false
      style-checks-enabled: true
      style-checks-bypassed: false
      code-checks-enabled: true
      code-checks-bypassed: false
      ort-enabled: true
      ort-bypassed: false
      ort-version: "87.3.0" # pin ORT: "latest" is unstable; >=87.2.0 required by current ort-config@main rules
      node-version: "24"
      runs-on: '["ubuntu-24.04"]'

  calculate_version:
    runs-on: ubuntu-24.04
    outputs:
      next-version: ${{ steps.semantic_versioning.outputs.next-version }}
      is-latest: ${{ steps.semantic_versioning.outputs.is-latest }}
      latest-tag: ${{ steps.semantic_versioning.outputs.latest-tag }}
    steps:
      - uses: epam/ai-dial-ci/actions/semantic_versioning@3.1.3
        id: semantic_versioning

  release:
    runs-on: ubuntu-24.04
    needs: [test, calculate_version]
    permissions:
      contents: write
      packages: write
      security-events: write

    steps:
      - name: Maximize build space
        uses: nepalevov/maximize-build-space@046c48361370e2f3fa758bd2f10c6ce29109ef62 # v1.1.0
        if: false # Maximize build space by removing unwanted software if set to true
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-large-packages: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          remove-java: "true"
          remove-swift: "true"
          remove-julia: "true"
          remove-browsers: "true"
          remove-cloud-tools: "true"
          remove-kubernetes-tools: "true"
          remove-powershell: "true"
          remove-container-tools: "true"
          remove-rust: "true"
          remove-python: "true"
          remove-node: "true"
          remove-go: "true"
          remove-ruby: "true"
          docker-cleanup: "true"
          set-tmpdir: "true"

      - uses: epam/ai-dial-ci/actions/generate_release_notes@3.1.3
        with:
          latest-tag: ${{ needs.calculate_version.outputs.latest-tag }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true
          token: ${{ secrets.ACTIONS_BOT_TOKEN }}

      - uses: epam/ai-dial-ci/actions/node_prepare@3.1.3
        with:
          node-version: "24"
          clean-install: true
          registry-url: "https://registry.npmjs.org"

      - name: Set version
        shell: bash
        run: |
          npm version ${{ needs.calculate_version.outputs.next-version }} --no-git-tag-version || true # Upstream branch may already be updated

      - uses: ./.github/actions/build_docker
        with:
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.ACTIONS_BOT_TOKEN }}
          dockerhub-username: ${{ secrets.DOCKERHUB_LOGIN }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image-name: ghcr.io/${{ env.IMAGE_NAME }}
          image-tag: ${{ needs.calculate_version.outputs.next-version }}
          push-enabled: false
          trivy-enabled: true
          bypass-checks: false
          trivy-severity: "CRITICAL,HIGH"
          trivy-severity-for-sarif: "CRITICAL,HIGH"
          trivy-limit-severities-for-sarif: true
          platforms: "linux/amd64"
          image-extra-aliases: |
            ${{ env.IMAGE_NAME }}:${{ needs.calculate_version.outputs.next-version }}
            ${{ github.ref == 'refs/heads/development' && format('{0}:{1}', env.IMAGE_NAME, 'development') || ''}}
            ${{ github.ref == 'refs/heads/development' && format('{0}/{1}:{2}', 'ghcr.io', env.IMAGE_NAME, 'development') || ''}}
            ${{ startsWith(github.ref, 'refs/heads/release-') && needs.calculate_version.outputs.is-latest == 'true' && format('{0}:{1}', env.IMAGE_NAME, 'latest') || ''}}
            ${{ startsWith(github.ref, 'refs/heads/release-') && needs.calculate_version.outputs.is-latest == 'true' && format('{0}/{1}:{2}', 'ghcr.io', env.IMAGE_NAME, 'latest') || ''}}

      - name: Publish packages to npmjs
        shell: bash
        run: |
          #!/bin/bash
          if node -e "process.exit(require('./package.json').scripts?.['build:publishable'] ? 0 : 1)"; then
            npm run build:publishable
          else
            npm run build
          fi
          PUBLISH_COMMAND="npm run publish"
          ARGS=""
          if [ "$IS_DEVELOPMENT_BRANCH" == "true" ]; then
            ARGS+=" --development"
          fi
          if [ "$IS_RELEASE_BRANCH" == "true" ] && [ "$IS_LATEST" == "true" ]; then
            ARGS+=" --tag latest"
          fi
          if [ -n "$ARGS" ]; then
            PUBLISH_COMMAND+=" --"$ARGS
          fi
          $PUBLISH_COMMAND
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          IS_LATEST: ${{ needs.calculate_version.outputs.is-latest == 'true' }}
          IS_DEVELOPMENT_BRANCH: ${{ github.ref == 'refs/heads/development' }}
          IS_RELEASE_BRANCH: ${{ startsWith(github.ref, 'refs/heads/release-') }}

      - uses: epam/ai-dial-ci/actions/publish_tag_release@3.1.3
        with:
          tag-version: ${{ needs.calculate_version.outputs.next-version }}
          changelog-file: "/tmp/my_changelog" # Comes from generate_release_notes step
          extra-commit-command: |
            git config --global user.name "statgpt-actions"
            git config --global user.email "231008922+statgpt-actions@users.noreply.github.com"
            git add package.json package-lock.json
            git commit -m '[skip ci] Update version' || true # Upstream branch may already be updated
