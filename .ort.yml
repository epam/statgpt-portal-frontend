---
excludes:
  paths:
    - pattern: 'package-lock.json'
      reason: 'BUILD_TOOL_OF'
    - pattern: 'libs/**'
      reason: 'OPTIONAL_COMPONENT_OF'
      comment: >-
        First-party workspace libraries (@epam/statgpt-*). They have no own
        lockfile and their third-party dependencies are already covered by the
        root project scan, so analyzing them as separate NPM projects only
        produces "No lockfile found" errors.
  scopes:
    - pattern: 'devDependencies'
      reason: 'DEV_DEPENDENCY_OF'
      comment: 'Packages for development only.'
license_choices:
  repository_license_choices:
    - given: 'GPL-2.0-only OR MIT'
      choice: 'MIT'
    - given: 'GPL-3.0-or-later OR MIT'
      choice: 'MIT'
